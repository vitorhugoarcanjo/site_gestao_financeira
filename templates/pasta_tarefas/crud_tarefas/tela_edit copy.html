<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAREFA EDIÇÃO</title>
</head>
<body>
    <h1>TELA DE EDIÇÃO ON COM FLASK</h1>

    <form method="post" action="{{ url_for('editar_tarefa.iniedittarefa', tarefa_id=tarefa_id) }}">
        <label>DESCRICAO:</label>
        <textarea name="descricao" rows="4" style="width: 100%;">{{ tarefa[0] }}</textarea>

        <label>STATUS:</label>
        <select name="status">
            <option value="pendente" {% if tarefa[1] == 'pendente' %}selected{% endif %}>PENDENTE</option>
            <option value="em andamento" {% if tarefa[1] == 'em andamento' %}selected{% endif %}>EM ANDAMENTO</option>
            <option value="concluido" {% if tarefa[1] == 'concluido' %}selected{% endif %}>CONCLUÍDO</option>
        </select>

        <label>Data Inicio</label>
        <input type="date" name="data_inicio" value="{{ tarefa[2] }}">

        <label>Data Final</label>
        <input type="date" name="data_final" value="{{ tarefa[3] }}">

        <label>CATEGORIA:</label>
        <select name="categoria_id">
            <option value="">⚠️ Sem categoria</option>
            {% for cat in todas_categorias %}
            <option value="{{ cat[0] }}" {% if cat[0] == tarefa[4] %}selected{% endif %}>{{ cat[1] }}</option>
            {% endfor %}
        </select>

        <label>PRIORIDADE:</label>
        <select name="prioridade">
            <option value="baixa" {% if tarefa[5] == 'baixa' %}selected{% endif %}>BAIXA</option>
            <option value="media" {% if tarefa[5] == 'media' %}selected{% endif %}>MÉDIA</option>
            <option value="alta" {% if tarefa[5] == 'alta' %}selected{% endif %}>ALTA</option>
        </select>

        <button type="submit">ATUALIZAR</button>
        <a href="{{ url_for('tarefas.ini_tarefas') }}">VOLTAR</a>

    </form>
</body>
</html>
