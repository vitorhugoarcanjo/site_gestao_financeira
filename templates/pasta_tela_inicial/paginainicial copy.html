<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVOLUÇÃO FINANÇAS</title>
    
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark min-vh-100 d-flex flex-column justify-content-center align-items-center text-center p-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show w-100 mb-4" role="alert" style="max-width: 500px;">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <!-- Logo/Título Principal -->
                <div class="mb-5">
                    <h1 class="display-4 fw-bold text-white mb-4">EVOLUÇÃO FINANÇAS</h1>
                    <p class="lead text-white-50 mb-4">SITE EM DESENVOLVIMENTO</p>
                    <p class="text-white-50">PROJETO FINANÇAS ESCOLAR</p>
                </div>

                <!-- Menu de Botões -->
                <div class="d-grid d-md-block gap-3 justify-content-center">
                    <a href="{{ url_for('login.validar_login') }}" class="btn btn-success btn-lg fw-bold px-4">Entrar</a>
                    <a href="{{ url_for('cadastre_se.tela_cadastre_se') }}" class="btn btn-outline-light btn-lg fw-bold px-4">Cadastre-se</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
