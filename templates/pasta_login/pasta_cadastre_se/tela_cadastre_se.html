<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- SCSS LOCAL -->
    <link rel="stylesheet" href="{{ url_for('static',filename='pasta_login_e_cadastre_se/global.css') }}">

    <!-- Seu JS telefone -->
    <script src="{{ url_for('static', filename='pasta_login/pasta_cadastre_se/telefone_js.js') }}"></script>
</head>

<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <section class="vh-100 d-flex justify-content-center align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-4">
                    <form action="/cadastre_se" method="POST">
                        <div class="card shadow">
                            <div class="card-body p-4">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Nome:</label>
                                    <input type="text" class="form-control" name="nome" placeholder="Insira seu nome" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">E-mail:</label>
                                    <input type="email" class="form-control" name="email" placeholder="Insira seu E-mail" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Telefone:</label>
                                    <input type="tel" class="form-control" name="telefone" placeholder="Insira seu telefone" oninput="formatarTelefone(this)" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Senha:</label>
                                    <input type="password" class="form-control" name="senha" placeholder="Insira uma senha" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Validação da senha:</label>
                                    <input type="password" class="form-control" name="confirmar_senha" placeholder="Insira novamente a senha" required>
                                </div>

                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-success fw-bold">Cadastrar</button>
                                    <button type="reset" class="btn btn-danger fw-bold">Limpar</button>
                                    <a href="{{ url_for('ini_app') }}" class="btn btn-warning fw-bold text-dark text-decoration-none">Voltar</a>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
